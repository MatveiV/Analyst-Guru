version: '3.9'

services:
  backend:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PROXYAPI_API_KEY=${PROXYAPI_API_KEY:-}
      - PROXYAPI_BASE_URL=${PROXYAPI_BASE_URL:-https://api.proxyapi.ru/openai/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/analyst_guru.db}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - RAG_TOP_K=${RAG_TOP_K:-5}
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./artifacts/analyst-guru
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
