openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AnalystGuru — AI System Analyst Copilot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: reviews
    description: AI review operations
  - name: kb
    description: Knowledge base operations
  - name: generators
    description: Document generators (URS, SRS, ADR, API Design, Architecture)
  - name: memory
    description: Memory framework
  - name: diagrams
    description: Diagram generation
  - name: audit
    description: Audit trail
  - name: dashboard
    description: Dashboard & statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Documents ───────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - name: doc_type
          in: query
          schema:
            type: ["string", "null"]
        - name: project_name
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── AI Reviewer ─────────────────────────────────────────────────────────────
  /documents/{id}/review:
    post:
      operationId: reviewDocument
      tags: [reviews]
      summary: Run AI review on a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List all reviews
      parameters:
        - name: needs_review
          in: query
          schema:
            type: ["boolean", "null"]
        - name: confidence
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /reviews/{id}:
    get:
      operationId: getReview
      tags: [reviews]
      summary: Get review by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /ai/review:
    post:
      operationId: directAiReview
      tags: [reviews]
      summary: Direct AI review (for testing/debug)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectReviewInput"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResult"

  /reviews/{id}/export/json:
    get:
      operationId: exportReviewJson
      tags: [reviews]
      summary: Export review as JSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JSON export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResult"

  /reviews/{id}/export/csv:
    get:
      operationId: exportReviewCsv
      tags: [reviews]
      summary: Export review as CSV
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string

  # ─── Knowledge Base ──────────────────────────────────────────────────────────
  /kb/documents:
    get:
      operationId: listKbDocuments
      tags: [kb]
      summary: List KB documents
      responses:
        "200":
          description: KB documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: addKbDocument
      tags: [kb]
      summary: Add document to knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: KB document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /kb/ask:
    post:
      operationId: askKnowledgeBase
      tags: [kb]
      summary: Ask a question to the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbQuestionInput"
      responses:
        "200":
          description: Answer with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbAnswer"

  /ai/answer_with_sources:
    post:
      operationId: directAiAnswerWithSources
      tags: [kb]
      summary: Direct AI answer (for testing/debug)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectAnswerInput"
      responses:
        "200":
          description: Answer with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /kb/history:
    get:
      operationId: listKbHistory
      tags: [kb]
      summary: Get Q&A history
      parameters:
        - name: needs_review
          in: query
          schema:
            type: ["boolean", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Q&A history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QARun"

  # ─── Document Generators ─────────────────────────────────────────────────────
  /documents/{id}/generate-urs:
    post:
      operationId: generateUrs
      tags: [generators]
      summary: Generate URS from document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated URS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedDocument"

  /documents/{id}/generate-srs:
    post:
      operationId: generateSrs
      tags: [generators]
      summary: Generate SRS from document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated SRS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedDocument"

  /documents/{id}/generate-adr:
    post:
      operationId: generateAdr
      tags: [generators]
      summary: Generate ADR from document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated ADR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdrRecord"

  /documents/{id}/design-api:
    post:
      operationId: designApi
      tags: [generators]
      summary: Generate OpenAPI specification from document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated API spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpec"

  /documents/{id}/recommend-architecture:
    post:
      operationId: recommendArchitecture
      tags: [generators]
      summary: Get architecture recommendation for document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Architecture recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureReview"

  /documents/{id}/export/docx:
    get:
      operationId: exportDocumentDocx
      tags: [documents]
      summary: Export document as DOCX
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DOCX file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ─── Memory Framework ────────────────────────────────────────────────────────
  /memory/store:
    post:
      operationId: storeMemory
      tags: [memory]
      summary: Store a memory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryItemInput"
      responses:
        "201":
          description: Stored memory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItem"

  /memory/search:
    post:
      operationId: searchMemory
      tags: [memory]
      summary: Search memory items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySearchInput"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryItem"

  /memory/recent:
    get:
      operationId: getRecentMemory
      tags: [memory]
      summary: Get recent memory items
      parameters:
        - name: memory_type
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent memory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryItem"

  /memory/consolidate:
    post:
      operationId: consolidateMemory
      tags: [memory]
      summary: Consolidate and deduplicate memory
      responses:
        "200":
          description: Consolidation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsolidationResult"

  # ─── Diagram Engine ──────────────────────────────────────────────────────────
  /documents/{id}/generate-diagrams:
    post:
      operationId: generateDiagrams
      tags: [diagrams]
      summary: Generate all diagrams for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated diagram set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramSet"

  /diagrams/{id}:
    get:
      operationId: getDiagram
      tags: [diagrams]
      summary: Get diagram by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diagram artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramArtifact"

  /diagrams/generate-c4:
    post:
      operationId: generateC4Diagrams
      tags: [diagrams]
      summary: Generate C4 diagrams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagramInput"
      responses:
        "200":
          description: C4 diagrams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramSet"

  /diagrams/generate-uml:
    post:
      operationId: generateUmlDiagrams
      tags: [diagrams]
      summary: Generate UML diagrams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagramInput"
      responses:
        "200":
          description: UML diagrams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramSet"

  /diagrams/generate-erd:
    post:
      operationId: generateErdDiagram
      tags: [diagrams]
      summary: Generate ERD diagram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagramInput"
      responses:
        "200":
          description: ERD diagram
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramSet"

  # ─── ADR Records ─────────────────────────────────────────────────────────────
  /adr:
    get:
      operationId: listAdrRecords
      tags: [generators]
      summary: List all ADR records
      parameters:
        - name: document_id
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: ADR records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdrRecord"

  /adr/{id}:
    get:
      operationId: getAdrRecord
      tags: [generators]
      summary: Get ADR record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ADR record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdrRecord"

  # ─── Architecture Reviews ─────────────────────────────────────────────────────
  /architecture-reviews:
    get:
      operationId: listArchitectureReviews
      tags: [generators]
      summary: List architecture reviews
      responses:
        "200":
          description: Architecture reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchitectureReview"

  # ─── API Specs ────────────────────────────────────────────────────────────────
  /api-specs:
    get:
      operationId: listApiSpecs
      tags: [generators]
      summary: List generated API specs
      responses:
        "200":
          description: API specs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiSpec"

  /api-specs/{id}:
    get:
      operationId: getApiSpec
      tags: [generators]
      summary: Get API spec by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpec"

  # ─── Audit ───────────────────────────────────────────────────────────────────
  /audit:
    get:
      operationId: listAuditRuns
      tags: [audit]
      summary: List audit runs
      parameters:
        - name: action
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditRun"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── Document ─────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, created_at, title, text, doc_type]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        title:
          type: string
        text:
          type: string
        doc_type:
          type: string
          enum: [tz, brd, user_story, srs, kb_article, urs, adr, api_spec]
        project_name:
          type: ["string", "null"]
        is_kb:
          type: boolean
          default: false

    DocumentInput:
      type: object
      required: [title, text]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        text:
          type: string
          minLength: 10
          maxLength: 30000
        doc_type:
          type: string
          default: tz
        project_name:
          type: ["string", "null"]
        is_kb:
          type: boolean
          default: false

    # ─── Review ───────────────────────────────────────────────────────────────
    RiskItem:
      type: object
      required: [severity, description]
      properties:
        severity:
          type: string
          enum: [low, medium, high]
        description:
          type: string

    ReviewResult:
      type: object
      required: [summary, confidence, needs_review]
      properties:
        summary:
          type: string
        risks:
          type: array
          items:
            $ref: "#/components/schemas/RiskItem"
        missing_requirements:
          type: array
          items:
            type: string
        questions_to_client:
          type: array
          items:
            type: string
        acceptance_criteria:
          type: array
          items:
            type: string
        similar_projects:
          type: array
          items:
            type: string
        lessons_learned:
          type: array
          items:
            type: string
        related_decisions:
          type: array
          items:
            type: string
        architecture_risks:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: [high, medium, low]
        needs_review:
          type: boolean

    Review:
      type: object
      required: [id, created_at, document_id, review_json, needs_review, confidence]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: string
        review_json:
          $ref: "#/components/schemas/ReviewResult"
        needs_review:
          type: boolean
        confidence:
          type: string
          enum: [high, medium, low]
        error:
          type: ["string", "null"]
        document_title:
          type: ["string", "null"]

    DirectReviewInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 30000

    # ─── Knowledge Base ───────────────────────────────────────────────────────
    KbSource:
      type: object
      required: [quote]
      properties:
        quote:
          type: string
        document_id:
          type: ["string", "null"]
        document_title:
          type: ["string", "null"]

    AnswerResult:
      type: object
      required: [answer, confidence, needs_review]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/KbSource"
        confidence:
          type: string
          enum: [high, medium, low]
        needs_review:
          type: boolean

    KbAnswer:
      type: object
      required: [id, created_at, question, answer, needs_review]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        question:
          type: string
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/KbSource"
        needs_review:
          type: boolean
        error:
          type: ["string", "null"]

    KbQuestionInput:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 5
          maxLength: 2000

    DirectAnswerInput:
      type: object
      required: [question, context]
      properties:
        question:
          type: string
        context:
          type: string

    QARun:
      type: object
      required: [id, created_at, question, answer, needs_review]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        question:
          type: string
        answer:
          type: string
        sources_json:
          type: array
          items:
            $ref: "#/components/schemas/KbSource"
        needs_review:
          type: boolean
        error:
          type: ["string", "null"]

    # ─── Generators ───────────────────────────────────────────────────────────
    GeneratedDocument:
      type: object
      required: [id, created_at, document_id, content_type, content, needs_review]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: string
        content_type:
          type: string
          enum: [urs, srs]
        content:
          type: string
        needs_review:
          type: boolean
        confidence:
          type: string
          enum: [high, medium, low]

    AdrAlternative:
      type: object
      required: [option, reason_rejected]
      properties:
        option:
          type: string
        reason_rejected:
          type: string

    AdrConsequences:
      type: object
      properties:
        positive:
          type: array
          items:
            type: string
        negative:
          type: array
          items:
            type: string

    AdrContent:
      type: object
      required: [title, status, context, problem, decision, confidence, needs_review]
      properties:
        title:
          type: string
        status:
          type: string
          enum: [proposed, accepted, deprecated, superseded]
        context:
          type: string
        problem:
          type: string
        decision:
          type: string
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/AdrAlternative"
        consequences:
          $ref: "#/components/schemas/AdrConsequences"
        confidence:
          type: string
          enum: [high, medium, low]
        needs_review:
          type: boolean

    AdrRecord:
      type: object
      required: [id, created_at, document_id, adr_json, needs_review]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: ["string", "null"]
        adr_json:
          $ref: "#/components/schemas/AdrContent"
        needs_review:
          type: boolean
        confidence:
          type: string
          enum: [high, medium, low]
        document_title:
          type: ["string", "null"]

    ArchitectureAlternative:
      type: object
      required: [pattern]
      properties:
        pattern:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string

    ArchitectureResult:
      type: object
      required: [recommended_pattern, rationale, confidence, needs_review]
      properties:
        recommended_pattern:
          type: string
        rationale:
          type: string
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureAlternative"
        integration_recommendations:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            $ref: "#/components/schemas/RiskItem"
        confidence:
          type: string
          enum: [high, medium, low]
        needs_review:
          type: boolean

    ArchitectureReview:
      type: object
      required: [id, created_at, document_id, recommendation_json, needs_review]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: string
        recommendation_json:
          $ref: "#/components/schemas/ArchitectureResult"
        needs_review:
          type: boolean
        document_title:
          type: ["string", "null"]

    ApiSpec:
      type: object
      required: [id, created_at, document_id]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: string
        openapi_json:
          type: string
        openapi_yaml:
          type: string
        document_title:
          type: ["string", "null"]

    # ─── Memory ───────────────────────────────────────────────────────────────
    MemoryItem:
      type: object
      required: [id, created_at, memory_type, content]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        memory_type:
          type: string
          enum: [semantic, episodic, decision, risk, requirement]
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        project_name:
          type: ["string", "null"]
        relevance_score:
          type: ["number", "null"]

    MemoryItemInput:
      type: object
      required: [memory_type, content]
      properties:
        memory_type:
          type: string
          enum: [semantic, episodic, decision, risk, requirement]
        content:
          type: string
          minLength: 1
        tags:
          type: array
          items:
            type: string
        project_name:
          type: ["string", "null"]

    MemorySearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        memory_type:
          type: ["string", "null"]
        limit:
          type: integer
          default: 10

    ConsolidationResult:
      type: object
      required: [deduplicated, merged, total_before, total_after]
      properties:
        deduplicated:
          type: integer
        merged:
          type: integer
        total_before:
          type: integer
        total_after:
          type: integer

    # ─── Diagrams ─────────────────────────────────────────────────────────────
    DiagramArtifact:
      type: object
      required: [id, created_at, document_id, diagram_type, notation, source_code]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        document_id:
          type: string
        diagram_type:
          type: string
          enum: [c4_context, c4_container, c4_component, sequence, class, erd, use_case, activity, state, deployment, flowchart]
        notation:
          type: string
          enum: [plantuml, mermaid]
        source_code:
          type: string
        needs_review:
          type: boolean

    DiagramSet:
      type: object
      required: [document_id, diagrams, needs_review]
      properties:
        document_id:
          type: string
        diagrams:
          type: array
          items:
            $ref: "#/components/schemas/DiagramArtifact"
        c4_context:
          type: ["string", "null"]
        c4_container:
          type: ["string", "null"]
        c4_component:
          type: ["string", "null"]
        use_case:
          type: ["string", "null"]
        sequence:
          type: ["string", "null"]
        class_diagram:
          type: ["string", "null"]
        erd:
          type: ["string", "null"]
        mermaid_flowchart:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [high, medium, low]
        needs_review:
          type: boolean

    DiagramInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 10
        diagram_types:
          type: array
          items:
            type: string

    # ─── Audit ────────────────────────────────────────────────────────────────
    AuditRun:
      type: object
      required: [id, created_at, action, status, duration_ms]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        action:
          type: string
        input:
          type: ["string", "null"]
        output:
          type: ["string", "null"]
        status:
          type: string
          enum: [ok, error, needs_review]
        error:
          type: ["string", "null"]
        duration_ms:
          type: integer

    # ─── Dashboard ────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [total_documents, total_reviews, total_kb_documents, total_qa_runs, needs_review_count, total_audit_runs, error_count, avg_duration_ms]
      properties:
        total_documents:
          type: integer
        total_reviews:
          type: integer
        total_kb_documents:
          type: integer
        total_qa_runs:
          type: integer
        needs_review_count:
          type: integer
        total_audit_runs:
          type: integer
        error_count:
          type: integer
        avg_duration_ms:
          type: number
        total_diagrams:
          type: integer
        total_adr_records:
          type: integer
        recent_errors:
          type: array
          items:
            $ref: "#/components/schemas/AuditRun"

    ActivityItem:
      type: object
      required: [id, created_at, action, status]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        action:
          type: string
        status:
          type: string
        description:
          type: ["string", "null"]
        needs_review:
          type: boolean
        duration_ms:
          type: ["integer", "null"]
